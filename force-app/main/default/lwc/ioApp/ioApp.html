<template>
    <section class="shell">
        <header class="hero">
            <div class="heroLeft">
                <div class="title">Integration Observability Pack</div>
                <div class="subtitle">API limits · Named Credentials · Webhook inbox · Replay · Correlation patterns</div>
            </div>

            <div class="heroRight">
                <span class="pill pillMuted">v{info.version}</span>
                <lightning-button variant="neutral" label="Refresh" onclick={refreshAll} disabled={busy}></lightning-button>
            </div>
        </header>

        <div class="tabs">
            <button class={tabClassOverview} onclick={goOverview}>Overview</button>
            <button class={tabClassLimits} onclick={goLimits}>API Limits</button>
            <button class={tabClassCreds} onclick={goCreds}>Named Credentials</button>
            <button class={tabClassInbox} onclick={goInbox}>Webhook Inbox</button>
            <button class={tabClassCorr} onclick={goCorrelation}>Correlation</button>
        </div>

        <div class="content">
            <template if:true={isOverview}>
                <div class="grid2">
                    <article class="card">
                        <div class="cardHeader">
                            <div class="cardTitle">Quick status</div>
                            <div class="pills">
                                <span class={apiHealthClass}>{apiHealthLabel}</span>
                                <span class="pill pillMuted">API v{info.apiVersion}</span>
                            </div>
                        </div>
                        <div class="cardBody">
                            <div class="kv">
                                <div class="kvRow">
                                    <div class="k">Webhook endpoint</div>
                                    <div class="v mono">{info.webhookPath}</div>
                                </div>
                                <div class="kvRow">
                                    <div class="k">Inbox items</div>
                                    <div class="v">{inboxCount}</div>
                                </div>
                                <div class="kvRow">
                                    <div class="k">Notes</div>
                                    <div class="v muted">No custom objects. Inbox uses Files (ContentVersion). Replay uses Named Credentials.</div>
                                </div>
                            </div>

                            <div class="callout">
                                <div class="calloutTitle">Next step</div>
                                <div class="calloutText">
                                    Create or pick a Named Credential for your integration target, then use the Webhook Inbox to replay captured payloads.
                                </div>
                            </div>
                        </div>
                    </article>

                    <article class="card">
                        <div class="cardHeader">
                            <div class="cardTitle">API snapshot</div>
                            <div class="pills">
                                <span class="pill pillMuted">last refresh {limitsFetchedAt}</span>
                            </div>
                        </div>
                        <div class="cardBody">
                            <template if:true={limits}>
                                <div class="bars">
                                    <template for:each={limitBars} for:item="b">
                                        <div class="barRow" key={b.key}>
                                            <div class="barKey">{b.label}</div>
                                            <div class="barTrack">
                                                <div class={b.barClass} style={b.style}></div>
                                            </div>
                                            <div class="barMeta">{b.used}/{b.max}</div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={limits}>
                                <div class="empty">No limits data yet. Open API Limits tab and refresh.</div>
                            </template>
                        </div>
                    </article>
                </div>
            </template>

            <template if:true={isLimits}>
                <article class="card">
                    <div class="cardHeader">
                        <div class="cardTitle">API limits & early warning</div>
                        <div class="pills">
                            <span class={apiHealthClass}>{apiHealthLabel}</span>
                            <lightning-button variant="brand" label="Fetch /limits" onclick={loadLimits} disabled={busy}></lightning-button>
                        </div>
                    </div>
                    <div class="cardBody">
                        <template if:true={limits}>
                            <div class="grid2">
                                <div>
                                    <div class="sectionTitle">Key signals</div>
                                    <div class="bars">
                                        <template for:each={limitBars} for:item="b">
                                            <div class="barRow" key={b.key}>
                                                <div class="barKey">{b.label}</div>
                                                <div class="barTrack">
                                                    <div class={b.barClass} style={b.style}></div>
                                                </div>
                                                <div class="barMeta">{b.used}/{b.max}</div>
                                            </div>
                                        </template>
                                    </div>
                                </div>

                                <div>
                                    <div class="sectionTitle">Raw limits payload</div>
                                    <pre class="code">{limitsPretty}</pre>
                                </div>
                            </div>
                        </template>
                        <template if:false={limits}>
                            <div class="empty">Click “Fetch /limits” to load API usage data.</div>
                        </template>
                    </div>
                </article>
            </template>

            <template if:true={isCreds}>
                <article class="card">
                    <div class="cardHeader">
                        <div class="cardTitle">Named Credential inventory</div>
                        <div class="pills">
                            <span class="pill pillMuted">Tooling API</span>
                            <lightning-button variant="brand" label="Load" onclick={loadNamedCreds} disabled={busy}></lightning-button>
                        </div>
                    </div>
                    <div class="cardBody">
                        <template if:true={namedCreds.length}>
                            <div class="tableWrap">
                                <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                    <thead>
                                        <tr>
                                            <th>Label</th>
                                            <th>DeveloperName</th>
                                            <th>Endpoint</th>
                                            <th>Principal</th>
                                            <th>Modified</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={namedCreds} for:item="c">
                                            <tr key={c.Id} class="rowHover" data-devname={c.DeveloperName} onclick={selectNamedCredential}>
                                                <td>{c.MasterLabel}</td>
                                                <td class="mono">{c.DeveloperName}</td>
                                                <td class="mono wrap">{c.Endpoint}</td>
                                                <td>{c.PrincipalType}</td>
                                                <td>{c.LastModifiedDate}</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                            <template if:true={selectedNC}>
                                <div class="callout slds-m-top_medium">
                                    <div class="calloutTitle">Selected for replay</div>
                                    <div class="calloutText mono">{selectedNC}</div>
                                </div>
                            </template>
                        </template>
                        <template if:false={namedCreds.length}>
                            <div class="empty">
                                No data loaded. Click “Load”. If this stays empty, ensure your user has “View Setup” permission.
                            </div>
                        </template>
                    </div>
                </article>
            </template>

            <template if:true={isInbox}>
                <div class="grid2">
                    <article class="card">
                        <div class="cardHeader">
                            <div class="cardTitle">Inbox (Files-backed)</div>
                            <div class="pills">
                                <span class="pill pillMuted">last {inboxFetchedAt}</span>
                                <lightning-button variant="brand" label="Refresh" onclick={loadInbox} disabled={busy}></lightning-button>
                            </div>
                        </div>
                        <div class="cardBody">
                            <template if:true={inbox.length}>
                                <div class="tableWrap">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                        <thead>
                                            <tr>
                                                <th>Created</th>
                                                <th>Corr</th>
                                                <th>Title</th>
                                                <th>By</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={inbox} for:item="x">
                                                <tr key={x.contentVersionId} class="rowHover" data-id={x.contentVersionId} onclick={openInboxItem}>
                                                    <td>{x.createdAt}</td>
                                                    <td class="mono">{x.corrId}</td>
                                                    <td class="mono wrap">{x.title}</td>
                                                    <td>{x.createdByName}</td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={inbox.length}>
                                <div class="empty">
                                    No inbox items found. Send a test webhook:
                                    <pre class="code">POST {baseUrl}{info.webhookPath}?key=myhook</pre>
                                </div>
                            </template>
                        </div>
                    </article>

                    <article class="card">
                        <div class="cardHeader">
                            <div class="cardTitle">Details & replay</div>
                            <div class="pills">
                                <span class="pill pillMuted">{selectedItemTitle}</span>
                            </div>
                        </div>

                        <div class="cardBody">
                            <template if:true={selectedItemJson}>
                                <div class="sectionTitle">Captured payload</div>
                                <pre class="code">{selectedItemJson}</pre>

                                <div class="sectionTitle slds-m-top_medium">Replay</div>
                                <div class="controls">
                                    <lightning-input label="Named Credential (DeveloperName)" value={selectedNC} onchange={noop}></lightning-input>
                                    <lightning-input label="Path" value={replayPath} onchange={handleReplayPath} placeholder="/v1/endpoint"></lightning-input>
                                    <lightning-combobox label="Method" value={replayMethod} options={methodOptions} onchange={handleReplayMethod}></lightning-combobox>
                                </div>
                                <div class="runActions">
                                    <lightning-button variant="brand" label="Replay Now" onclick={replayNow} disabled={replayDisabled}></lightning-button>
                                </div>

                                <template if:true={replayResult}>
                                    <div class="sectionTitle slds-m-top_medium">Replay result</div>
                                    <div class="kv">
                                        <div class="kvRow"><div class="k">Status</div><div class="v">{replayResult.statusCode} {replayResult.status}</div></div>
                                        <div class="kvRow"><div class="k">CorrId</div><div class="v mono">{replayResult.corrId}</div></div>
                                    </div>
                                    <pre class="code">{replayResult.responseBody}</pre>
                                </template>
                            </template>

                            <template if:false={selectedItemJson}>
                                <div class="empty">Select an inbox item on the left to view and replay.</div>
                            </template>
                        </div>
                    </article>
                </div>
            </template>

            <template if:true={isCorrelation}>
                <article class="card">
                    <div class="cardHeader">
                        <div class="cardTitle">Correlation patterns</div>
                        <div class="pills">
                            <span class="pill pillMuted">library</span>
                        </div>
                    </div>

                    <div class="cardBody">
                        <div class="callout">
                            <div class="calloutTitle">Apex usage pattern</div>
                            <div class="calloutText">
                                Use <span class="mono">IO_Correlation.get()</span> to stamp callouts and queueables, and log a stable marker:
                            </div>
                            <pre class="code">String corr = IO_Correlation.get();
IO_Correlation.debugMarker('before callout');
HttpRequest r = new HttpRequest();
IO_Correlation.applyTo(r);</pre>
                        </div>

                        <div class="callout slds-m-top_medium">
                            <div class="calloutTitle">Debug log browsing</div>
                            <div class="calloutText">
                                The UI does not rely on debug logs to function. If you want correlation browsing, enable Debug Logs for your integration user and
                                use a log search tool (or extend this app to query <span class="mono">ApexLog</span> via Tooling API).
                            </div>
                        </div>

                        <div class="sectionTitle slds-m-top_medium">Why no custom objects?</div>
                        <div class="muted">
                            This repo is designed for “drop-in” adoption. Webhook inbox records are stored as Files so deployments stay schema-neutral.
                        </div>
                    </div>
                </article>
            </template>
        </div>

        <template if:true={busy}>
            <div class="toastMask">
                <div class="toastCard">
                    <div class="spinner"></div>
                    <div class="toastText">{busyLabel}</div>
                </div>
            </div>
        </template>
    </section>
</template>
